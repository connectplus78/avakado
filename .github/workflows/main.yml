name: Canlı TV M3U Güncelleyici

on:
  schedule:
    - cron: '0 0 * * *' # Her gün gece yarısı günceller
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kütüphaneleri Yükle
      run: pip install requests

    - name: Botu Çalıştır
      run: python main.py

    - name: Değişiklikleri Kaydet ve Gönder
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add kanallar.m3u
        git commit -m "Güncel M3U listesi çekildi" || echo "Değişiklik yok."
        git push
