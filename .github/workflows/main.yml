name: Canlı TV M3U Güncelleyici

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Yazılımları ve Selenium'u Yükle
      run: |
        sudo apt-get update
        # libgbm-dev eklenmesi, Chrome'un headless modda çalışması için kritiktir
        sudo apt-get install -y google-chrome-stable libgbm-dev
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager

    - name: Botu Çalıştır
      run: python main.py

    - name: Değişiklikleri Git ile Gönder
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add kanallar.m3u
        git commit -m "Saatlik M3U Güncellemesi" || echo "Değişiklik yok."
        git push
