name: Kanal 7 Guncelleme Botu

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch:     # Manuel çalıştırma butonu ekler

jobs:
  bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: pip install requests

    - name: Botu Çalıştır
      run: python main.py

    - name: Değişikliği GitHub'a Gönder
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add kanallar.m3u
        git commit -m "Bot: Kanal 7 M3U Güncellendi" || echo "Değişiklik yok."
        git push
